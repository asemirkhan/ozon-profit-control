version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: ozon_postgres
    environment:
      POSTGRES_USER: ozon
      POSTGRES_PASSWORD: ozon_pass
      POSTGRES_DB: ozon_db
    ports:
      - "5432:5432"
    volumes:
      - ozon_pgdata:/var/lib/postgresql/data
volumes:
  ozon_pgdata: